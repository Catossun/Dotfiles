# 位置：~/Library/Rime/squirrel.custom.yaml
patch:
  style:
    inline_preedit: true           # 非內嵌編碼行

    # 設定 Nord 配色方案
    color_scheme: nord_dark        # macos 明亮主題
    color_scheme_dark: nord_dark   # macos 黑暗主題

    horizontal: true               # 候選窗是否橫向顯示
    candidate_format: "%c  %@ "    # 編號與候選詞間距
    corner_radius: 8               # 窗口圓角
    hilited_corner_radius: 6       # 高亮圓角
    line_spacing: 10               # 行間距
    border_height: 4               # 窗口上下高度（稍微增加一點質感更好）
    border_width: 4                # 窗口左右寬度
    font_face: "PingFangSC"        # 候選詞字體
    font_point: 16                 # 候選字大小
    label_font_point: 13           # 候選編號大小

  # 顏色參數格式為 (#aabbggrr)，Rime 的顏色表示是藍綠紅，所以順序需注意
  preset_color_schemes:
    nord_dark:
      name: "Nord Dark (Aurora)"
      # 格式：0xaabbggrr (Alpha, Blue, Green, Red)

      back_color: 0xff40342e           # nord0: #2E3440 (背景深藍)
      border_color: 0xff4c423b         # nord1: #3B4252 (邊框)
      text_color: 0xffd8dee9           # nord4: #D8DEE9 (拼音文字)
      label_color: 0xff6a564c          # nord3: #4C566A (編號)
      candidate_text_color: 0xffeceff4 # nord6: #ECEFF4 (候選文字)

      # --- 高亮選中項 (使用 Nord15: #B48EAD) ---
      # Alpha: ff, Blue: AD, Green: 8E, Red: B4
      hilited_back_color: 0xffad8eb4
      hilited_candidate_text_color: 0xff40342e # 選中文字保持亮色
      hilited_candidate_label_color: 0xff40342e # 選中編號稍淡
      hilited_text_color: 0xffad8eb4   # 拼音高亮同步 Nord15

      comment_text_color: 0xffc1a181   # nord9: #81A1C1
      hilited_comment_text_color: 0xff4c423b # 選中註解
